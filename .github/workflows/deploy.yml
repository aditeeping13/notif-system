name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/notif-system
            
            # Stash any local changes on the VM (like the .env file modifications we made manually) 
            # to ensure git pull works smoothly without conflicts.
            git stash
            
            # Pull the latest changes from the main branch
            git pull origin main
            
            # Re-apply the stashed .env changes so it has the KAFKA_EXTERNAL_HOST configured
            git stash pop || echo "Nothing to pop"
            
            # Rebuild and restart the Docker containers
            docker compose up --build -d
